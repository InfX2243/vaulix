<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GhostKey</title>

    <link rel="icon" href="assets/favicon.png">

    <!-- Inter Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="css/styles.css">
</head>

<body>

    <div class="app">

        <!-- HEADER -->
        <header class="header">
            <h1 class="logo">GhostKey</h1>
            <p class="subtitle">Zero-knowledge encrypted credential vault</p>
        </header>

        <!-- MAIN VAULT SHELL -->
        <main class="vault-shell">

            <!-- SIDEBAR -->
            <aside class="sidebar">

                <div class="sidebar-header">
                    Vault
                </div>

                <div class="vault-list">

                    <div class="vault-item active">
                        Personal
                    </div>

                    <div class="vault-item">
                        Work
                    </div>

                    <div class="vault-item">
                        Finance
                    </div>

                </div>

            </aside>

            <!-- MAIN CONTENT -->
            <section class="vault-main">

                <!-- STATUS BAR -->
                <div class="status-bar">

                    <div class="status-left">
                        Status: <span class="status-ok">Secure</span>
                    </div>

                    <div class="status-right">
                        Session: Active
                    </div>

                </div>

                <!-- CONTENT AREA -->
                <div class="content-card">

                    <h2>Vault Overview</h2>

                    <p class="placeholder">
                        No credentials selected. Initialize or select a vault item.
                    </p>

                </div>

            </section>

        </main>

    </div>

    <script src="js/app.js"></script>
</body>
</html>
